name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: cargo build --verbose

      - name: Run unit tests
        run: cargo test --verbose --lib

      - name: Run integration tests against Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_TEST_TABLE: ${{ secrets.SUPABASE_TEST_TABLE }}
          SUPABASE_TEST_SELECT: ${{ secrets.SUPABASE_TEST_SELECT }}
        run: cargo test --verbose --test host_reqwest